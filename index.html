<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TripCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-sun" viewBox="0 0 64 64"><circle cx="32" cy="32" r="13" fill="#ffc857"/><g stroke="#ffc857" stroke-width="3.5" stroke-linecap="round"><line x1="32" y1="6" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="58"/><line x1="6" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="58" y2="32"/><line x1="13.7" y1="13.7" x2="18.6" y2="18.6"/><line x1="45.4" y1="45.4" x2="50.3" y2="50.3"/><line x1="13.7" y1="50.3" x2="18.6" y2="45.4"/><line x1="45.4" y1="18.6" x2="50.3" y2="13.7"/></g></symbol>
      <symbol id="i-partly" viewBox="0 0 64 64"><circle cx="22" cy="24" r="9" fill="#ffc857"/><g stroke="#ffc857" stroke-width="2.6" stroke-linecap="round"><line x1="22" y1="8" x2="22" y2="12"/><line x1="6" y1="24" x2="10" y2="24"/><line x1="11" y1="13" x2="14" y2="16"/><line x1="30" y1="16" x2="33" y2="13"/></g><path d="M18 44c0-7 6-12 13-12 6 0 11 4 12 9 5 .3 9 4 9 9 0 5-4 9-9 9H20c-5 0-9-4-9-9 0-4 3-7 7-7z" fill="#cfd8e8"/></symbol>
      <symbol id="i-cloud" viewBox="0 0 64 64"><path d="M16 42c0-8 7-14 15-14 7 0 13 4 14 11 6 .3 11 5 11 11 0 6-5 11-11 11H18c-6 0-11-4-11-10 0-5 4-9 9-9z" fill="#cfd8e8"/></symbol>
      <symbol id="i-rain" viewBox="0 0 64 64"><path d="M14 36c0-8 7-14 15-14 7 0 13 4 14 11 6 .3 11 5 11 11 0 6-5 10-11 10H16c-6 0-10-4-10-10 0-4 3-8 8-8z" fill="#cfd8e8"/><g fill="#7cc7ff"><path d="M19 50c0 0-3 4-3 6.5S17.5 60 19 60s3-1 3-3.5S19 50 19 50z"/><path d="M30 52c0 0-3 4-3 6.5S28.5 62 30 62s3-1 3-3.5S30 52 30 52z"/><path d="M41 50c0 0-3 4-3 6.5S39.5 60 41 60s3-1 3-3.5S41 50 41 50z"/></g></symbol>
      <symbol id="i-heavy" viewBox="0 0 64 64"><path d="M14 34c0-8 7-14 15-14 7 0 13 4 14 11 6 .3 11 5 11 11 0 6-5 10-11 10H16c-6 0-10-4-10-10 0-4 3-8 8-8z" fill="#b8c4d8"/><g fill="#7cc7ff"><path d="M16 50c0 0-3 4-3 6.5S14.5 60 16 60s3-1 3-3.5S16 50 16 50z"/><path d="M25 52c0 0-3 4-3 6.5S23.5 62 25 62s3-1 3-3.5S25 52 25 52z"/><path d="M34 50c0 0-3 4-3 6.5S32.5 60 34 60s3-1 3-3.5S34 50 34 50z"/><path d="M43 52c0 0-3 4-3 6.5S41.5 62 43 62s3-1 3-3.5S43 52 43 52z"/></g></symbol>
      <symbol id="i-snow" viewBox="0 0 64 64"><path d="M14 36c0-8 7-14 15-14 7 0 13 4 14 11 6 .3 11 5 11 11 0 6-5 10-11 10H16c-6 0-10-4-10-10 0-4 3-8 8-8z" fill="#cfd8e8"/><g fill="#e8f1ff" stroke="#cfd8e8" stroke-width="1"><circle cx="19" cy="55" r="2"/><circle cx="32" cy="58" r="2"/><circle cx="45" cy="55" r="2"/></g></symbol>
      <symbol id="drop" viewBox="0 0 8 10"><path d="M4 0 C4 0 0 5 0 7 C0 8.66 1.79 10 4 10 C6.21 10 8 8.66 8 7 C8 5 4 0 4 0 Z"/></symbol>
    </defs>
  </svg>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="eyebrow">Multi-Model Trip Forecast</div>
        <h1>Trip<em>Cast</em></h1>
      </div>
      <div class="unit-toggle">
        <button id="unit-f" class="unit-btn active" data-unit="F">F</button>
        <button id="unit-c" class="unit-btn" data-unit="C">C</button>
      </div>
    </header>
    <section id="form-section" class="form-section">
      <div class="form-intro"><p>Add each leg of your trip. We blend ECMWF, GFS, ICON, GEM, JMA, and Met Office forecasts.</p></div>
      <div id="legs" class="legs"></div>
      <div class="form-actions">
        <button id="add-leg" class="btn btn-ghost">+ Add another leg</button>
        <button id="submit" class="btn btn-primary">Get forecast</button>
      </div>
      <div id="form-error" class="form-error" hidden></div>
    </section>
    <section id="loading" class="loading" hidden>
      <div class="spinner"></div>
      <div class="loading-text">Fetching forecasts...</div>
    </section>
    <section id="results" class="results" hidden>
      <div class="results-header">
        <div>
          <div class="eyebrow">Forecast</div>
          <h2 id="results-title" class="results-title">Your Trip</h2>
        </div>
        <div class="results-actions">
          <button id="share-btn" class="btn btn-ghost btn-sm">Copy link</button>
          <button id="edit-btn" class="btn btn-ghost btn-sm">Edit trip</button>
        </div>
      </div>
      <div class="scroll-wrap"><div id="grid" class="grid"></div></div>
      <div class="footer">
        <div><strong>Sources:</strong> ECMWF, GFS, ICON, GEM, JMA, UK Met Office (via Open-Meteo)</div>
        <div><strong>Confidence:</strong> <span class="conf-dot conf-high"></span> high <span class="conf-dot conf-med"></span> medium <span class="conf-dot conf-low"></span> low</div>
      </div>
    </section>
    <footer class="page-footer">TripCast - Powered by Open-Meteo</footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
